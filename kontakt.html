<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boks Pro | Kontakt</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🥊 Boks Pro</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Početna</a></li>
          <li class="nav-item"><a class="nav-link" href="ponuda.xml">Ponuda</a></li>
          <li class="nav-item"><a class="nav-link active" href="kontakt.html">Kontakt</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <header class="page-header text-white text-center">
    <div class="container">
      <h1 class="fw-bold">Kontakt</h1>
      <p class="lead">Pošalji upit za boksačku opremu.</p>
    </div>
  </header>

  <main class="container py-5">
    <div class="row g-4">
      <div class="col-md-6">
        <h2>Kontakt podaci</h2>
        <p><strong>Adresa:</strong> Sportska 12, Zagreb</p>
        <p><strong>Email:</strong> info@bokspro.hr</p>
        <p><strong>Telefon:</strong> +385 91 123 4567</p>
      </div>
      <div class="col-md-6">
        <form class="card p-4 shadow-sm">
          <div class="mb-3">
            <label for="ime" class="form-label">Ime i prezime</label>
            <input type="text" class="form-control" id="ime" placeholder="Unesi ime">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Unesi email">
          </div>
          <div class="mb-3">
            <label for="poruka" class="form-label">Poruka</label>
            <textarea class="form-control" id="poruka" rows="5" placeholder="Napiši poruku"></textarea>
          </div>
          <button type="submit" class="btn btn-danger">Pošalji</button>
        </form>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-4">
    <p class="mb-0">&copy; Mate Babić</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
